<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - SF Works Hub</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="header">
<div class="logo">⚡ Admin Panel</div>
<a href="/logout" class="logout">Logout</a>
</div>

<div class="container">

<div class="card">
<h2>📊 Booking Requests</h2>

{% for b in bookings %}
<div class="worker">

<div>
<p><b>User:</b> {{ b[1] }}</p>
<p><b>Worker:</b> {{ b[2] }}</p>
<p><b>Phone:</b> {{ b[3] }}</p>
<p><b>Service:</b> {{ b[4] }}</p>
<p><b>Area:</b> {{ b[5] }}</p>
<p><b>Status:</b> {{ b[6] }}</p>
</div>

<!-- ✅ ACTION BUTTONS (CORRECT POSITION) -->
<div class="actions">
<a href="/approve/{{ b[0] }}" class="edit">Approve</a>
<a href="/reject/{{ b[0] }}" class="delete">Reject</a>
</div>

</div>
{% endfor %}

</div>

</div>

</body>
</html>
