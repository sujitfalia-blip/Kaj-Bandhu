<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat - SF Works Hub</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="header">
<div class="logo">💬 Chat</div>
<a href="/" class="logout">Back</a>
</div>

<div class="container">

<div class="card">
<h3>Chat with Worker</h3>

<!-- ✅ AUTO FILL SAFE -->
<input id="name" value="{{ name if name else '' }}" placeholder="Your Name">
<input id="phone" value="{{ phone if phone else '' }}" placeholder="Worker Phone">

<textarea id="msg" placeholder="Type your message..."></textarea>

<button onclick="sendMsg()">Send WhatsApp</button>
</div>

</div>

<script>
function sendMsg(){
let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let msg=document.getElementById("msg").value.trim();

// ✅ SIMPLE VALIDATION
if(!phone){
alert("Enter worker phone number");
return;
}

let text=`Hello, I am ${name}. ${msg}`;
window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(text));
}
</script>

</body>
</html>
